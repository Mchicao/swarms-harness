name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --manifest-path rust/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Tests
        run: cargo test --manifest-path rust/Cargo.toml --all-features
      - name: Release build
        run: cargo build --release --manifest-path rust/Cargo.toml --all-features
      - name: Doctor
        run: cargo run --manifest-path rust/Cargo.toml -- doctor
      - name: Review
        run: cargo run --manifest-path rust/Cargo.toml -- review --plan docs/workflow_plan_example.json
      - name: Dry-run
        run: cargo run --manifest-path rust/Cargo.toml -- dry-run --plan docs/workflow_plan_example.json --force --run-id ci-dry
      - name: Mock E2E
        run: cargo run --manifest-path rust/Cargo.toml -- run --plan docs/workflow_plan_example.json --force --run-id ci-e2e --global-max-concurrency 3 --provider-cap mock=3

  python-legacy:
    name: Python legacy tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: python -m pip install -e ".[dev,yaml]"
      - name: Compile
        run: python -m py_compile scripts/swarm.py scripts/plan_review.py scripts/workflow_runtime.py scripts/doctor.py scripts/mock_worker.py
      - name: Lint
        run: |
          python -m ruff check .
          python -m ruff format --check .
      - name: Tests
        run: python -m pytest tests -q
