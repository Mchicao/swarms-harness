name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: python -m pip install -e ".[dev,yaml]"
      - name: Compile
        run: python -m py_compile scripts/swarm.py scripts/plan_review.py scripts/workflow_runtime.py scripts/doctor.py scripts/mock_worker.py
      - name: Lint and format
        run: |
          python -m ruff check .
          python -m ruff format --check .
      - name: Tests
        run: python -m pytest tests -q
      - name: Doctor
        run: python scripts/swarm.py doctor
      - name: Offline workflow
        run: python scripts/swarm.py run --plan docs/workflow_plan_example.json --force --run-id ci --global-max-concurrency 3 --provider-cap mock=3
      - name: Wheel smoke test
        run: |
          python -m pip wheel . --no-deps --wheel-dir dist
          python -m venv /tmp/swarms-wheel
          /tmp/swarms-wheel/bin/pip install --no-deps dist/*.whl
          cd /tmp
          /tmp/swarms-wheel/bin/swarms doctor
          /tmp/swarms-wheel/bin/swarms run --force --run-id ci-wheel --global-max-concurrency 3 --provider-cap mock=3
