    <rect x="382" y="342" width="190" height="70" rx="10" fill="#efe1c5" stroke="#111518" stroke-width="2"/>
    <text x="412" y="383" font-size="18" font-weight="700" fill="#111518">Provider caps</text>

    <rect x="650" y="218" width="178" height="58" rx="10" fill="#d7e3f1" stroke="#111518" stroke-width="2"/>
    <text x="683" y="254" font-size="17" font-weight="700" fill="#111518">GLM 5.2</text>

    <rect x="650" y="300" width="178" height="58" rx="10" fill="#d7e3f1" stroke="#111518" stroke-width="2"/>
    <text x="676" y="336" font-size="17" font-weight="700" fill="#111518">Gemini Flash</text>

