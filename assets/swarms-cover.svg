<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">SWARMS quota-saving coding workflow harness</title>
  <desc id="desc">A clean technical banner showing planning, provider caps, worker lanes, verification, and telemetry.</desc>
  <rect width="1280" height="640" fill="#f6f3ec"/>
  <rect x="64" y="64" width="1152" height="512" rx="18" fill="#101417"/>
  <rect x="92" y="92" width="1096" height="456" rx="12" fill="#f8f7f2"/>

  <text x="132" y="160" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" fill="#111518">SWARMS</text>
  <text x="136" y="203" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" fill="#3b454c">Plan with expensive models. Execute with cheaper workers. Keep the runtime honest.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
