    <text x="692" y="418" font-size="17" font-weight="700" fill="#111518">Mock CI</text>

    <rect x="908" y="276" width="196" height="86" rx="10" fill="#dce7d0" stroke="#111518" stroke-width="2"/>
    <text x="950" y="313" font-size="19" font-weight="700" fill="#111518">Verify</text>
    <text x="950" y="341" font-size="15" fill="#45525a">tests, logs, report.json</text>
  </g>

  <g stroke="#111518" stroke-width="3" fill="none">
